# Cover Letter Template - Deutsch
# Homer Simpson Anschreibenvorlage mit korrekten Platzhaltern
# Platzhalter verwenden das Format ==PLATZHALTER_NAME== (doppelte Gleichheitszeichen auf jeder Seite)

language: german
version: current

# Metadaten
metadata:
  author: Homer J. Simpson
  last_updated: 2026-01-19
  description: Professionelle Anschreibenvorlage mit anpassbaren Platzhaltern

# Vorlageninhalt mit Platzhaltern
template:
  greeting: "Sehr geehrte/r ==RECIPIENT_NAME==,"

  paragraphs:
    - "ich schreibe Ihnen, um mein starkes Interesse an der Position ==POSITION== bei ==COMPANY== in ==LOCATION== zum Ausdruck zu bringen. Mit über 35 Jahren Erfahrung als Sicherheitsinspektor im Kernkraftwerk Springfield habe ich ein einzigartiges Kompetenzprofil entwickelt, das technische Expertise mit kreativem Problemlösen und unerschütterlichem Engagement verbindet."

    - "Im Laufe meiner Karriere habe ich erfolgreich komplexe Sicherheitsabläufe verwaltet und dabei stets höchste Effizienzstandards eingehalten. Meine Erfahrung umfasst Krisenmanagement, Teamführung und innovative Ansätze für komplexe Herausforderungen. Ich fühle mich besonders zu ==COMPANY== hingezogen, da Ihr Engagement für Exzellenz perfekt mit meinen beruflichen Werten und meiner Arbeitsethik übereinstimmt."

    - "Neben meiner Expertise im Bereich Nuklearsicherheit bringe ich vielfältige Erfahrungen aus verschiedenen Rollen mit, darunter Grammy-prämierter Musiker, Unternehmer (Mr. Plow Schneeräumdienst) und Gemeindevorsteher. Diese Vielfalt an Erfahrungen hat mich gelehrt, wie wichtig Anpassungsfähigkeit, Ausdauer und eine positive Einstellung auch in schwierigen Situationen sind."

    - "Ich freue mich auf die Möglichkeit, zum anhaltenden Erfolg von ==COMPANY== beizutragen, und würde gerne besprechen, wie meine Fähigkeiten und Erfahrungen den Anforderungen der ==POSITION== entsprechen. Ich stehe für ein Vorstellungsgespräch zu Ihrer Verfügung und bin unter (555) 7334 oder chunkylover53@aol.com erreichbar."

    - "Vielen Dank für die Berücksichtigung meiner Bewerbung. Ich freue mich darauf, Teil Ihres Teams zu werden."

  closing: "Mit freundlichen Grüßen,"
  signature: "Homer J. Simpson"

# Platzhalterdefinitionen und Beispiele
# Diese dienen der Dokumentation - die tatsächlichen Platzhalter im Template verwenden das ==PLATZHALTER_NAME== Format
placeholders:
  - name: COMPANY
    description: "Name des Unternehmens (automatisch aus der Bewerbung)"
    location: "Im gesamten Brief"
    example: "Globex Corporation"

  - name: POSITION
    description: "Stellenbezeichnung (automatisch aus der Bewerbung)"
    location: "Erster Absatz und Schluss"
    example: "Senior-Sicherheitsinspektor"

  - name: RECIPIENT_NAME
    description: "Kontaktperson oder Personalverantwortliche/r (automatisch aus der Bewerbung)"
    location: "Anrede"
    example: "Herr Burns"

  - name: LOCATION
    description: "Arbeitsort (automatisch aus der Bewerbung)"
    location: "Erster Absatz"
    example: "Springfield"

  - name: SALARY
    description: "Gehalt aus der Bewerbung (automatisch aus der Bewerbung)"
    location: "Nach Bedarf"
    example: "60.000 - 80.000 EUR"

# Verwendungshinweise zum Verständnis des Platzhaltensystems
usage_notes: |
  Diese Anschreibenvorlage zeigt, wie Platzhalter effektiv zu verwenden sind:
  
  PLATZHALTERFORMAT:
  - Platzhalter verwenden das Format ==PLATZHALTER_NAME== (mit doppelten Gleichheitszeichen auf jeder Seite)
  - Verfügbar: ==COMPANY==, ==POSITION==, ==RECIPIENT_NAME==, ==LOCATION==, ==SALARY==

  AUTOMATISCHE ERSETZUNG:
  - Beim Erstellen einer Bewerbung werden die Platzhalter automatisch mit den Bewerbungsdaten ersetzt
  - ==COMPANY== → Firmenname, ==POSITION== → Stellenbezeichnung
  - ==RECIPIENT_NAME== → Kontaktperson, ==LOCATION== → Arbeitsort, ==SALARY== → Gehalt

# Beispiel, wie die Vorlage ausgefüllt aussieht (nur zur Referenz)
example_filled_letter: |
  Sehr geehrter Herr Scorpio,

  ich schreibe Ihnen, um mein starkes Interesse an der Position Nuklearsicherheits-Supervisor bei Globex Corporation zum Ausdruck zu bringen. Mit über 35 Jahren Erfahrung als Sicherheitsinspektor im Kernkraftwerk Springfield habe ich ein einzigartiges Kompetenzprofil entwickelt, das technische Expertise mit kreativem Problemlösen und unerschütterlichem Engagement verbindet.

  Im Laufe meiner Karriere habe ich erfolgreich Reaktorüberwachung und Implementierung von Sicherheitsprotokollen verwaltet und dabei stets höchste Sicherheits- und Effizienzstandards eingehalten. Meine Erfahrung umfasst Krisenmanagement, Teamführung und innovative Ansätze für komplexe Herausforderungen. Ich fühle mich besonders zu Globex Corporation hingezogen, da Ihr Engagement für Innovation und Mitarbeiterförderung perfekt mit meinen beruflichen Werten und meiner Arbeitsethik übereinstimmt.

  Neben meiner Expertise im Bereich Nuklearsicherheit bringe ich vielfältige Erfahrungen aus verschiedenen Rollen mit, darunter Grammy-prämierter Musiker, Unternehmer (Mr. Plow Schneeräumdienst) und Gemeindevorsteher. Diese Vielfalt an Erfahrungen hat mich gelehrt, wie wichtig Anpassungsfähigkeit, Ausdauer und eine positive Einstellung auch in schwierigen Situationen sind.

  Ich freue mich auf die Möglichkeit, zum anhaltenden Erfolg von Globex Corporation beizutragen, und würde gerne besprechen, wie meine Fähigkeiten und Erfahrungen den Anforderungen der Nuklearsicherheits-Supervisor entsprechen. Ich stehe für ein Vorstellungsgespräch zu Ihrer Verfügung und bin unter (555) 7334 oder chunkylover53@aol.com erreichbar.

  Vielen Dank für die Berücksichtigung meiner Bewerbung. Ich freue mich darauf, Teil Ihres Teams zu werden und zu globaler Dominierung durch überlegene Arbeitsplatzsicherheit beizutragen.

  Mit freundlichen Grüßen,
  Homer J. Simpson
