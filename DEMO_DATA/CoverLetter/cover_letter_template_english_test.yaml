# Cover Letter Template - English
# Homer Simpson themed cover letter with proper placeholder examples
# Placeholders use the format ==PLACEHOLDER_NAME== (double equals on each side)

language: english
version: current

# Metadata
metadata:
  author: Homer Jay Simpson
  last_updated: 2026-01-19
  description: Professional cover letter template with customizable placeholders

# Template content demonstrating placeholder usage
template:
  greeting: "Dear ==RECIPIENT_NAME==,"
  
  paragraphs:
    - "I am writing to express my strong interest in the ==POSITION== position at ==COMPANY== in ==LOCATION==. With over 35 years of experience as a Safety Inspector at the Springfield Nuclear Power Plant, I have developed a unique skill set that combines technical expertise with creative problem-solving and unwavering dedication."

    - "Throughout my career, I have successfully managed complex safety operations while maintaining the highest standards of efficiency. My experience includes crisis management, team leadership, and innovative approaches to complex challenges. I am particularly drawn to ==COMPANY== because of your commitment to excellence, which aligns perfectly with my professional values and work ethic."

    - "In addition to my nuclear safety expertise, I bring diverse experience from roles including Grammy Award-winning musician, entrepreneur (Mr. Plow Snow Removal), and community leader. This breadth of experience has taught me the importance of adaptability, perseverance, and maintaining a positive attitude even in challenging situations."

    - "I am excited about the opportunity to contribute to ==COMPANY=='s continued success and would welcome the chance to discuss how my skills and experience align with your needs for the ==POSITION== role. I am available for an interview at your convenience and can be reached at (555) 7334 or chunkylover53@aol.com."

    - "Thank you for considering my application. I look forward to the possibility of joining your team."
  
  closing: "Sincerely,"
  signature: "Homer Jay Simpson"

# Placeholder definitions and examples
# These are for documentation purposes - the actual placeholders in the template use ==PLACEHOLDER_NAME== format
placeholders:
  - name: COMPANY
    description: "The name of the company you're applying to (auto-filled from application)"
    location: "Throughout letter"
    example: "Globex Corporation"

  - name: POSITION
    description: "The job title you're applying for (auto-filled from application)"
    location: "First paragraph and closing"
    example: "Senior Safety Inspector"

  - name: RECIPIENT_NAME
    description: "The contact person or hiring manager (auto-filled from application)"
    location: "Greeting"
    example: "Mr. Burns"

  - name: LOCATION
    description: "The job location (auto-filled from application)"
    location: "First paragraph"
    example: "Springfield"

  - name: SALARY
    description: "The salary from the application (auto-filled from application)"
    location: "As needed"
    example: "60,000 - 80,000 USD"

# Usage notes for understanding placeholder system
usage_notes: |
  This cover letter template demonstrates how to use placeholders effectively:
  
  PLACEHOLDER FORMAT:
  - Placeholders use the format ==PLACEHOLDER_NAME== (with double equals on each side)
  - Available: ==COMPANY==, ==POSITION==, ==RECIPIENT_NAME==, ==LOCATION==, ==SALARY==

  AUTOMATIC REPLACEMENT:
  - When creating a job application, placeholders are automatically replaced with application data
  - ==COMPANY== → Company name, ==POSITION== → Job title
  - ==RECIPIENT_NAME== → Contact person, ==LOCATION== → Job location, ==SALARY== → Salary

# Example of how the template looks when filled (for reference only)
example_filled_letter: |
  Dear Hank Scorpio,

  I am writing to express my strong interest in the Nuclear Safety Supervisor position at Globex Corporation. With over 35 years of experience as a Safety Inspector at the Springfield Nuclear Power Plant, I have developed a unique skill set that combines technical expertise with creative problem-solving and unwavering dedication.

  Throughout my career, I have successfully managed nuclear reactor monitoring and safety protocol implementation while maintaining the highest standards of safety and efficiency. My experience includes crisis management, team leadership, and innovative approaches to complex challenges. I am particularly drawn to Globex Corporation because of your commitment to innovation and employee empowerment, which aligns perfectly with my professional values and work ethic.

  In addition to my nuclear safety expertise, I bring diverse experience from roles including Grammy Award-winning musician, entrepreneur (Mr. Plow Snow Removal), and community leader. This breadth of experience has taught me the importance of adaptability, perseverance, and maintaining a positive attitude even in challenging situations.

  I am excited about the opportunity to contribute to Globex Corporation's continued success and would welcome the chance to discuss how my skills and experience align with your needs for the Nuclear Safety Supervisor role. I am available for an interview at your convenience and can be reached at (555) 7334 or chunkylover53@aol.com.

  Thank you for considering my application. I look forward to the possibility of joining your team and contributing to global domination through superior workplace safety.

  Sincerely,
  Homer Jay Simpson
